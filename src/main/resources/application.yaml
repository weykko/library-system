spring:
  application:
    name: library-system
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_HOST:library_system}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

timeout:
  default-interval: 20

management:
  endpoints:
    web:
      exposure:
        include: '*'